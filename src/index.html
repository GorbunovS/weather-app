<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <h1>Погода</h1>
    <select id="citySelect">
      <option value="Moscow">Москва</option>
      <option value="London">Лондон</option>
      <option value="Berlin">Берлин</option>
      <option value="Paris">Париж</option>
      <option value="Madrid">Мадрид</option>
    </select>
    <button id="getWeatherBtn">Узнать погоду</button>
    <div id="weatherResult">
      <h2>Актуальная</h2>
      <div id="currentWeather"></div>
      <h2>Прогноз на 3 дня</h2>
      <div id="forecast"></div>
    </div>
  </div>
</body>
</html>

<style>
  body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f5;
  }
  
  #app {
    background-color: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 400px;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  h1 {
    font-size: 36px;
    margin-bottom: 20px;
    color: #333;
    font-weight: 700;
  }

  select, button {
    margin: 10px 0;
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background-color: #007aff;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background-color: #005a8c;
  }

  #weatherResult {
    margin-top: 20px;
  }

  h2 {
    font-size: 20px;
    color: #666;
    margin-bottom: 10px;
  }

  #currentWeather {
    font-size: 24px;
    font-weight: 700;
    color: #333;
  }

  #forecast {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

  .forecastDay {
    text-align: center;
    padding: 10px;
    background-color: #f7f7f7;
    border-radius: 12px;
    width: 28%;
  }

  .forecastDay span {
    display: block;
    font-size: 18px;
    font-weight: 500;
    color: #333;
  }

  .forecastDay .temperature {
    font-size: 20px;
    color: #ff6600;
  }

  select, button {
    width: 100%;
    margin-top: 10px;
  }
  
  /* Backgrounds for different weather states */
  .sunny {
    background-color: #ffcc66;
  }

  .cloudy {
    background-color: #d3d3d3;
  }

  .rainy {
    background-color: #4682b4;
  }

  .snowy {
    background-color: #b0e0e6;
  }
</style>
